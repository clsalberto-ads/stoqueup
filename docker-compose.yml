services:
  db:
    image: postgres:16-alpine
    container_name: stoqueup-db
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: stoqueup
    ports:
      - "5432:5432"
    volumes:
      - stoqueup-data:/var/lib/postgresql/data

volumes:
  stoqueup-data:
